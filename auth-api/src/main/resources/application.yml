spring:
  application:
    name: auth-api
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/auth_db
    username: ${DB_USER:auth_user}
    password: ${DB_PASSWORD:auth_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
  session:
    store-type: redis
    redis:
      namespace: auth-api:sessions
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false

app:
  mail:
    from: ${MAIL_FROM:auth@jorisjonkers.dev}
    from-name: ${MAIL_FROM_NAME:jorisjonkers.dev}
  confirmation-url: ${CONFIRMATION_URL:http://localhost:5174/confirm-email}

auth:
  login-url: http://localhost:5174/login
  issuer: ${AUTH_ISSUER:http://localhost:8081}

server:
  port: 8081

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      group:
        liveness:
          include: ping

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui
