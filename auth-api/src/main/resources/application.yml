session:
  timeout: ${SESSION_TIMEOUT:30d}

spring:
  application:
    name: auth-api
  threads:
    virtual:
      enabled: true
  autoconfigure:
    exclude:
      - org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      uri: ${VAULT_ADDR:http://localhost:8200}
      authentication: ${VAULT_AUTHENTICATION:TOKEN}
      config:
        lifecycle:
          enabled: true
          min-renewal: 10s
          expiry-threshold: 60s
          lease-endpoints: Leases
      database:
        enabled: ${VAULT_DB_ENABLED:false}
        role: auth-api
        backend: database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/auth_db
    username: ${DB_USER:auth_user}
    password: ${DB_PASSWORD:auth_password}
    hikari:
      pool-name: auth-api-pool
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 10000
      validation-timeout: 5000
      idle-timeout: 600000
      keepalive-time: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      initialization-fail-timeout: 60000
      auto-commit: true
      data-source-properties:
        tcpKeepAlive: true
        socketTimeout: 30
        connectTimeout: 10
        loginTimeout: 10
        ApplicationName: auth-api
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      timeout: 500ms
  cache:
    type: redis
    redis:
      # The cache TTLs + per-cache serialization are set explicitly in
      # CacheConfig.kt; leaving this default on avoids Spring Boot
      # auto-configuring an in-memory ConcurrentMap fallback if the
      # Redis connection fails open.
      cache-null-values: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false
          # Stalwart in the cluster serves a Let's Encrypt cert for its
          # public hostname (mail.jorisjonkers.dev), but auth-api connects
          # to the in-cluster service name `stalwart.mail-system.svc.cluster.local`
          # so the SAN cannot match. PR #256 added `ssl.trust=*` which
          # makes the X509TrustManager accept any chain, but the failure
          # came back as a SAN mismatch at a different layer:
          # Angus Mail (Jakarta Mail's successor, on Spring Boot 4)
          # additionally sets `sslParameters.endpointIdentificationAlgorithm
          # = "HTTPS"` during the SSLSocket handshake, and JDK 21
          # enforces SAN matching via that path regardless of the trust
          # manager. Setting `checkserveridentity=false` tells Angus Mail
          # to leave that algorithm null. The hop is pod-to-pod inside
          # the cluster network; trusting any server cert and skipping
          # hostname matching is acceptable here, the alternative is
          # plumbing a dedicated SMTP ingress just to satisfy SAN.
          ssl:
            trust: '*'
            checkserveridentity: false

app:
  mail:
    from: ${MAIL_FROM:auth@jorisjonkers.dev}
    from-name: ${MAIL_FROM_NAME:jorisjonkers.dev}
  confirmation-url: ${CONFIRMATION_URL:http://localhost:5174/confirm-email}

auth:
  login-url: http://localhost:5174/login
  issuer: ${AUTH_ISSUER:http://localhost:8081}

server:
  port: 8081
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30d}

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # Full per-contributor breakdown so a composite 503 is diagnosable
      # with one curl: /api/actuator/health shows {"status":"DOWN",
      # "details":{"db":{"status":"DOWN","error":"..."},"mail":{"status":"UP"},...}}.
      # The actuator path is already behind forward-auth in production
      # and the details fields expose descriptor data (db product name,
      # mail host) only — never credentials.
      show-details: always
      group:
        liveness:
          include: ping
  metrics:
    tags:
      # Common Micrometer tag added to every emitted metric. Matches
      # the variable convention used by the spring-boot-jvm Grafana
      # dashboard (variable `application`) and our service-template
      # dashboard. Without this tag the dashboards have no way to
      # filter per service.
      application: ${spring.application.name}
  # OTLP tracing: spans flow to the Alloy DaemonSet which forwards to
  # Tempo. sampling=1.0 because this stack's traffic is low and
  # dashboards filter by URI — partial sampling would starve the
  # low-rate endpoints. propagation=w3c matches the traceparent
  # header Traefik emits, so the trace continues across the ingress.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://alloy.observability.svc.cluster.local:4318/v1/traces}
  observations:
    key-values:
      service.name: ${spring.application.name}
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:unknown}

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/swagger-ui
