name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: mint-app-token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: assert-token-minted
        # Fail loudly if the App token is missing — never fall back to GITHUB_TOKEN.
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$APP_TOKEN" ]; then
            echo "E_APP_TOKEN_MISSING: Release App token was not minted." >&2
            echo "Secrets RELEASE_APP_ID and RELEASE_APP_PRIVATE_KEY must be configured." >&2
            echo "GITHUB_TOKEN fallback is intentionally forbidden." >&2
            exit 1
          fi
          echo "App token minted successfully (token prefix: ${APP_TOKEN:0:4}...)"

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-api-clients:
    name: Publish API Clients
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: JorisJonkers-dev/github-workflows/.github/workflows/publish-api-clients.yml@4b444f9a50edf76e4aea4148d73407c34a1e43a4 # v0.12.1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      spec-path: client-spec/openapi/auth-api.json
      api-name: auth-api
      version: ${{ needs.release-please.outputs.tag_name }}
      ts-package: '@jorisjonkers-dev/auth-api-client'
      maven-group: dev.jorisjonkers
      java-artifact: auth-api-client-java
      kotlin-artifact: auth-api-client-kotlin
      openapi-client-gradle-version: 0.3.1
      dry-run: false
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}
      node-auth-token: ${{ secrets.GITHUB_TOKEN }}