name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: JorisJonkers-dev/github-workflows/.github/workflows/container-publish.yml@v0.6.1
    with:
      image-name: auth-api/auth-api
      version: ${{ needs.release-please.outputs.tag_name }}
      context: .
      dockerfile: Dockerfile
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}

  publish-maven-clients:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Publish JVM clients
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          ./gradlew \
            :api:exportOpenApiSpec \
            :clients:java:publish \
            :clients:kotlin:publish \
            -PartifactVersion="$version" \
            --no-daemon

  publish-typescript-client:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Configure npm registry
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo "@jorisjonkers-dev:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > ~/.npmrc

      - name: Publish TypeScript client
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm --filter @jorisjonkers-dev/auth-api-client generate
          pnpm --filter @jorisjonkers-dev/auth-api-client build
          pnpm --filter @jorisjonkers-dev/auth-api-client publish --no-git-checks --access public
