name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: JorisJonkers-dev/github-workflows/.github/workflows/container-publish.yml@v0.6.1
    with:
      image-name: auth-api/auth-api
      version: ${{ needs.release-please.outputs.tag_name }}
      context: .
      dockerfile: Dockerfile
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}

  publish-api-clients:
    name: Publish API Clients
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: JorisJonkers-dev/github-workflows/.github/workflows/publish-api-clients.yml@v0.7.1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      spec-path: client-spec/openapi/auth-api.json
      api-name: auth-api
      version: ${{ needs.release-please.outputs.tag_name }}
      ts-package: "@jorisjonkers-dev/auth-api-client"
      maven-group: dev.jorisjonkers
      java-artifact: auth-api-client-java
      kotlin-artifact: auth-api-client-kotlin
      dry-run: false
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}
      node-auth-token: ${{ secrets.GITHUB_TOKEN }}
